# build-t3code-artifacts.yaml
#
# Purpose: Build the forked T3Code server (from the vendor-t3code submodule,
#          branch bearer-auth) for linux/amd64 and linux/arm64 (glibc), then
#          attach the tarballs as assets to a GitHub Release on this repo.
#
#          The release tag format is `t3code-server-<releaseVersion>` (e.g.
#          `t3code-server-0.0.28-boblangley.1`), matching the URL convention
#          that features/src/t3code-server/install.sh uses when downloading:
#
#            https://github.com/boblangley/t3code-devcontainer-relay/releases/download/
#              t3code-server-<tag>/t3code-server-linux-<arch>.tar.gz
#
#          A `t3code-server-latest` release alias is also updated so install.sh
#          can resolve version=latest without being confused by other releases
#          in this repo, such as devcontainer feature releases.
#
# Triggers:
#   - push of tags matching t3code-server-*
#   - workflow_dispatch with an optional releaseVersion input
#
# Coordination points:
#   - PACKAGE_FILTER below must match the pnpm workspace package name/filter
#     for the server app in the t3code fork. Check vendor-t3code/apps/server/
#     package.json for the "name" field. Likely candidates: `@t3tools/server`,
#     `server`, or `t3`. Update the variable if it differs.
#   - NODE_VERSION should match the `engines.node` field in the fork's root
#     package.json. Node 22 is a safe LTS default but pin to the fork's
#     minimum major if it differs.
#   - SERVER_BUILD_OUTPUT is the directory inside apps/server/ that
#     `pnpm --filter t3 build:bundle` produces.

name: Build – T3Code Server Artifacts

on:
  push:
    tags:
      - "t3code-server-*"
      - "!t3code-server-latest"
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: >
          Release version suffix (e.g. "0.0.28-boblangley.1"). The GitHub
          Release will be tagged "t3code-server-<releaseVersion>". Leave blank
          to use vendor/t3code.yml releaseVersion.
        required: false
        default: ""

permissions:
  contents: write

env:
  # -------------------------------------------------------------------------
  # Confirmed against vendor-t3code @ bearer-auth: apps/server/package.json
  # "name" = "t3" (its bin is dist/bin.mjs; `start` = `node dist/bin.mjs`).
  # -------------------------------------------------------------------------
  PACKAGE_FILTER: "t3"

  # -------------------------------------------------------------------------
  # Confirmed against vendor-t3code @ bearer-auth: root engines.node = "^24.13.1"
  # (server engines also accept ^22.16 || ^23.11 || >=24.10; build with 24).
  # -------------------------------------------------------------------------
  NODE_VERSION: "24"

  # -------------------------------------------------------------------------
  # COORDINATION: The subdirectory within apps/server/ that `pnpm build` emits.
  # Commonly "dist" or "out". Verify against the fork's tsconfig / build script.
  # -------------------------------------------------------------------------
  SERVER_BUILD_OUTPUT: "dist"

jobs:
  # --------------------------------------------------------------------------
  # Resolve the release tag once, shared across both arch jobs.
  # --------------------------------------------------------------------------
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      artifact_tag: ${{ steps.tag.outputs.artifact_tag }}
      latest_tag: ${{ steps.tag.outputs.latest_tag }}
      fork_tag: ${{ steps.vendor.outputs.fork_tag }}
      fork_commit: ${{ steps.vendor.outputs.fork_commit }}
      upstream_version: ${{ steps.vendor.outputs.upstream_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # submodules intentionally not fetched here — see the explicit
        # non-recursive init below for why (orphan nested gitlink in the fork).

      - name: Fetch vendor-t3code submodule (non-recursive)
        run: git submodule update --init --depth=1 vendor-t3code

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate vendor manifest
        run: bash scripts/validate-vendor-t3code.sh

      - name: Read vendor manifest
        id: vendor
        run: |
          manifest_value() {
            awk -F':[[:space:]]*' -v key="$1" '
              $1 ~ "^[[:space:]]*" key "$" {
                value = $2
                sub(/[[:space:]]+#.*/, "", value)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                print value
                exit
              }
            ' vendor/t3code.yml
          }
          echo "release_version=$(manifest_value releaseVersion)" >> "$GITHUB_OUTPUT"
          echo "fork_tag=$(manifest_value forkTag)" >> "$GITHUB_OUTPUT"
          echo "fork_commit=$(manifest_value forkCommit)" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$(manifest_value upstreamVersion)" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            case "$RELEASE_TAG" in
              t3code-server-*) ARTIFACT_TAG="${RELEASE_TAG#t3code-server-}" ;;
              *) echo "Unexpected tag: $RELEASE_TAG" >&2; exit 1 ;;
            esac
          elif [[ -n "${{ github.event.inputs.releaseVersion }}" ]]; then
            INPUT_VERSION="${{ github.event.inputs.releaseVersion }}"
            ARTIFACT_TAG="$INPUT_VERSION"
          else
            ARTIFACT_TAG="${{ steps.vendor.outputs.release_version }}"
            RELEASE_TAG="t3code-server-${ARTIFACT_TAG}"
          fi
          LATEST_TAG="t3code-server-latest"
          if [[ "$ARTIFACT_TAG" != "${{ steps.vendor.outputs.release_version }}" ]]; then
            echo "Artifact tag ${ARTIFACT_TAG} does not match vendor/t3code.yml releaseVersion ${{ steps.vendor.outputs.release_version }}." >&2
            exit 1
          fi
          echo "artifact_tag=${ARTIFACT_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}"   >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}"     >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG}"

  # --------------------------------------------------------------------------
  # Build the server for each architecture on a native runner.
  # linux/amd64 → ubuntu-24.04
  # linux/arm64 → ubuntu-24.04-arm (GitHub-hosted ARM runner)
  #
  # Using native runners avoids the complexity of cross-compiling a Node app
  # (which involves native addons and architecture-specific node_modules). Each
  # runner produces a self-contained tarball of the bundled server plus its
  # production dependencies. The devcontainer feature invokes the system Node
  # runtime installed by its node feature dependency.
  # --------------------------------------------------------------------------
  build:
    needs: resolve-tag
    strategy:
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-24.04
          - arch: arm64
            # GitHub-hosted ARM runner (ubuntu-24.04-arm).
            # If this runner type is not enabled on your account, replace with
            # a self-hosted ARM runner or use cross-compilation via QEMU.
            runs_on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs_on }}

    env:
      TARBALL_NAME: t3code-server-linux-${{ matrix.arch }}.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # submodules intentionally not fetched here — see the explicit
        # non-recursive init below for why (orphan nested gitlink in the fork).

      - name: Fetch vendor-t3code submodule (non-recursive)
        run: git submodule update --init --depth=1 vendor-t3code

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - name: Install pnpm dependencies (frozen lockfile)
        working-directory: vendor-t3code
        # Install only the server package and its dependency closure. A full
        # workspace install pulls in desktop-only Electron postinstalls, which
        # are unnecessary for the server tarball and can fail on transient
        # Electron download errors.
        run: pnpm --filter "${{ env.PACKAGE_FILTER }}..." install --frozen-lockfile

      - name: Bundle server app
        # COORDINATION: The --filter value must match the pnpm workspace package
        # name for apps/server in the fork. Adjust PACKAGE_FILTER env var above.
        # Common alternatives: --filter=server  --filter=t3  --filter="./apps/server"
        working-directory: vendor-t3code
        run: pnpm --filter "${{ env.PACKAGE_FILTER }}" build:bundle

      - name: Package build output into tarball
        # COORDINATION: SERVER_BUILD_OUTPUT must match the directory that
        # the server bundle script writes to inside vendor-t3code/apps/server/.
        # The tarball is laid out so that extracting it yields:
        #   t3code-server/dist/...   (or whatever SERVER_BUILD_OUTPUT is)
        #   t3code-server/package.json
        #   t3code-server/node_modules/...
        # install.sh expects to find the entry point at a known relative path.
        run: |
          BUILD_DIR="vendor-t3code/apps/server/${{ env.SERVER_BUILD_OUTPUT }}"

          if [[ ! -d "$BUILD_DIR" ]]; then
            echo "ERROR: Expected build output directory not found: $BUILD_DIR"
            echo "Check SERVER_BUILD_OUTPUT env var and the fork's build script."
            exit 1
          fi

          STAGING_ROOT="staging"
          STAGING="$STAGING_ROOT/t3code-server"
          rm -rf "$STAGING_ROOT"
          mkdir -p "$STAGING_ROOT"

          # The Vite bundle intentionally leaves most third-party runtime
          # dependencies external. pnpm deploy materializes a standalone
          # package with production node_modules, including native modules for
          # the current runner architecture.
          WORKSPACE_ROOT="${GITHUB_WORKSPACE:-$PWD}"
          (
            cd vendor-t3code
            pnpm --filter "${{ env.PACKAGE_FILTER }}" deploy --legacy --prod "${WORKSPACE_ROOT}/${STAGING}"
          )

          ENTRYPOINT="$STAGING/${{ env.SERVER_BUILD_OUTPUT }}/bin.mjs"
          if [[ ! -f "$ENTRYPOINT" ]]; then
            echo "ERROR: Expected server entrypoint not found: $ENTRYPOINT"
            echo "Check SERVER_BUILD_OUTPUT and apps/server/package.json bin."
            exit 1
          fi

          if [[ ! -d "$STAGING/node_modules" ]]; then
            echo "ERROR: Expected production dependencies not found: $STAGING/node_modules"
            exit 1
          fi

          node -e "require.resolve('effect', { paths: [process.argv[1]] })" "$STAGING"
          node -e "require.resolve('@effect/platform-node', { paths: [process.argv[1]] })" "$STAGING"

          tar -czf "${{ env.TARBALL_NAME }}" -C "$STAGING_ROOT" t3code-server
          echo "Tarball contents:"
          tar -tzf "${{ env.TARBALL_NAME }}" | head -30

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL_NAME }}
          path: ${{ env.TARBALL_NAME }}
          retention-days: 1

  # --------------------------------------------------------------------------
  # Create (or update) the GitHub Release and attach both arch tarballs.
  # The release tag is `t3code-server-<tag>`.
  # A `t3code-server-latest` release alias is also kept updated. Do not rely on
  # GitHub's global "latest release" pointer because this repo also publishes
  # devcontainer feature releases such as v0.1.x.
  #
  # install.sh download URL pattern (must stay in sync):
  #   https://github.com/boblangley/t3code-devcontainer-relay/releases/download/
  #     t3code-server-<tag>/t3code-server-linux-<arch>.tar.gz
  # --------------------------------------------------------------------------
  release:
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download amd64 tarball
        uses: actions/download-artifact@v4
        with:
          name: t3code-server-linux-amd64.tar.gz

      - name: Download arm64 tarball
        uses: actions/download-artifact@v4
        with:
          name: t3code-server-linux-arm64.tar.gz

      - name: Create/update versioned GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.release_tag }}
          name: "T3Code Server ${{ needs.resolve-tag.outputs.artifact_tag }}"
          body: |
            Forked T3Code server build (bearer-auth branch) for linux/amd64 and linux/arm64.

            Release version: `${{ needs.resolve-tag.outputs.artifact_tag }}`
            Upstream version: `${{ needs.resolve-tag.outputs.upstream_version }}`
            Fork tag: `${{ needs.resolve-tag.outputs.fork_tag }}`
            Fork commit: `${{ needs.resolve-tag.outputs.fork_commit }}`

            **Assets:**
            - `t3code-server-linux-amd64.tar.gz` — for amd64 (x86_64) hosts
            - `t3code-server-linux-arm64.tar.gz` — for arm64 (aarch64) hosts

            These artifacts are consumed by the `t3code-server` devcontainer feature
            (`features/src/t3code-server/install.sh`).
          make_latest: false
          overwrite_files: true
          files: |
            t3code-server-linux-amd64.tar.gz
            t3code-server-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move latest server tag to this build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ needs.resolve-tag.outputs.latest_tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ref="tags/${LATEST_TAG}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/${ref}" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/${ref}" \
              --field sha="${TARGET_SHA}" \
              --field force=true
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              --field ref="refs/tags/${LATEST_TAG}" \
              --field sha="${TARGET_SHA}"
          fi

      - name: Create/update latest server alias and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.latest_tag }}
          name: "T3Code Server latest"
          body: |
            Floating alias for the latest forked T3Code server build.

            Current versioned release: `${{ needs.resolve-tag.outputs.release_tag }}`
            Release version: `${{ needs.resolve-tag.outputs.artifact_tag }}`
            Fork tag: `${{ needs.resolve-tag.outputs.fork_tag }}`
            Fork commit: `${{ needs.resolve-tag.outputs.fork_commit }}`

            These artifacts are consumed when the `t3code-server` devcontainer feature
            is configured with `version=latest`.
          make_latest: false
          overwrite_files: true
          files: |
            t3code-server-linux-amd64.tar.gz
            t3code-server-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
