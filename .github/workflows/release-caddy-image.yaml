# release-caddy-image.yaml
#
# Purpose: Build and push the custom Caddy image (xcaddy + caddy-docker-proxy +
#          cloudflare DNS + t3code-relay module) to GHCR as a multi-arch image.
#
# Triggers:
#   - push of component version tags matching relay-caddy-* (e.g. relay-caddy-0.1.7)
#   - workflow_dispatch with an explicit version
#
# Pushes to: ghcr.io/boblangley/t3code-relay-caddy
#
# Build context is the repo root because caddy/Dockerfile COPYs the module/ directory
# (the local Go module that is baked into the xcaddy build).

name: Release – Caddy Image

on:
  push:
    tags:
      - "relay-caddy-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Caddy image version to publish, without the relay-caddy- prefix."
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            case "$TAG" in
              relay-caddy-*) VERSION="${TAG#relay-caddy-}" ;;
              *) echo "Unexpected tag: $TAG" >&2; exit 1 ;;
            esac
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/boblangley/t3code-relay-caddy
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=relay-caddy-${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          # Context must be the repo root so caddy/Dockerfile can COPY ./module/
          context: .
          file: ./caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
