# release-web-image.yaml
#
# Purpose: Build and push the T3Code web app image to GHCR as a multi-arch image.
#          The web app is built from the vendor-t3code git submodule (fork of
#          pingdotgg/t3code, branch bearer-auth), so the checkout includes
#          submodules recursively.
#
# Triggers:
#   - push of version tags matching v* (e.g. v0.1.0)
#   - workflow_dispatch (manual run)
#
# Pushes to: ghcr.io/boblangley/t3code-relay-web
#
# Build context: repo root (web/Dockerfile can reference the submodule at
# vendor-t3code/ from there). Adjust to `context: ./web` if the Dockerfile
# only needs files inside web/ — but root is the safe default given the
# submodule lives at the repo root.

name: Release – Web Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # NOTE: submodules are intentionally NOT fetched by actions/checkout.
        # The t3code fork carries an orphan nested gitlink at
        # .repos/alchemy-effect/.vendor/alchemy whose URL is declared only in
        # .repos/alchemy-effect/.gitmodules, not the submodule root. Whenever
        # actions/checkout fetches submodules it ALSO runs
        # `git submodule foreach --recursive` (hardcoded) to persist
        # credentials, which recurses into that orphan gitlink and dies with
        # "No url found for submodule path". So we init vendor-t3code ourselves
        # below, non-recursively, sidestepping that recursive foreach.

      - name: Fetch vendor-t3code submodule (non-recursive)
        # Only the top-level vendor-t3code is needed (it is public, so no auth
        # is required). The .repos/* are reference-only and not part of the
        # pnpm workspace, so we never recurse into them.
        run: git submodule update --init --depth=1 vendor-t3code

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/boblangley/t3code-relay-web
          tags: |
            # Tag `latest` on every tag push.
            # NOTE: enable={{is_default_branch}} is intentionally NOT used here
            # because this workflow is tag-triggered; the runner HEAD is detached
            # at the tag, so is_default_branch would always be false.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # Semver tags from the git tag (e.g. v0.1.0 → 0.1.0, 0.1, 0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Also tag the full git tag string as-is (e.g. v0.1.0)
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          # Context is repo root so the Dockerfile can reference vendor-t3code/
          # submodule contents. If web/Dockerfile is self-contained and only
          # needs files inside web/, change context to ./web.
          context: .
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
