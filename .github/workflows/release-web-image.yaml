# release-web-image.yaml
#
# Purpose: Build and push the T3Code web app image to GHCR as a multi-arch image.
#          The web app is built from the vendor-t3code git submodule (fork of
#          pingdotgg/t3code, branch bearer-auth), so the checkout includes
#          submodules recursively.
#
# Triggers:
#   - push to main when vendor-t3code or vendor/t3code.yml changes
#   - push of fork-derived web image tags matching t3code-web-*
#   - workflow_dispatch (manual run)
#
# Pushes to: ghcr.io/boblangley/t3code-relay-web
#
# Build context: repo root (web/Dockerfile can reference the submodule at
# vendor-t3code/ from there). Adjust to `context: ./web` if the Dockerfile
# only needs files inside web/ — but root is the safe default given the
# submodule lives at the repo root.

name: Release – Web Image

on:
  push:
    branches:
      - main
    tags:
      - "t3code-web-*"
    paths:
      - "vendor-t3code"
      - "vendor/t3code.yml"
      - "web/**"
      - ".github/workflows/release-web-image.yaml"
      - "scripts/validate-vendor-t3code.sh"
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: >
          Web image version to publish, without the t3code-web- prefix. Leave
          blank to use vendor/t3code.yml releaseVersion.
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # NOTE: submodules are intentionally NOT fetched by actions/checkout.
        # The t3code fork carries an orphan nested gitlink at
        # .repos/alchemy-effect/.vendor/alchemy whose URL is declared only in
        # .repos/alchemy-effect/.gitmodules, not the submodule root. Whenever
        # actions/checkout fetches submodules it ALSO runs
        # `git submodule foreach --recursive` (hardcoded) to persist
        # credentials, which recurses into that orphan gitlink and dies with
        # "No url found for submodule path". So we init vendor-t3code ourselves
        # below, non-recursively, sidestepping that recursive foreach.

      - name: Fetch vendor-t3code submodule (non-recursive)
        # Only the top-level vendor-t3code is needed (it is public, so no auth
        # is required). The .repos/* are reference-only and not part of the
        # pnpm workspace, so we never recurse into them.
        run: git submodule update --init --depth=1 vendor-t3code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate vendor manifest
        run: bash scripts/validate-vendor-t3code.sh

      - name: Read vendor manifest
        id: vendor
        run: |
          manifest_value() {
            awk -F':[[:space:]]*' -v key="$1" '
              $1 ~ "^[[:space:]]*" key "$" {
                value = $2
                sub(/[[:space:]]+#.*/, "", value)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                print value
                exit
              }
            ' vendor/t3code.yml
          }
          echo "release_version=$(manifest_value releaseVersion)" >> "$GITHUB_OUTPUT"
          echo "fork_tag=$(manifest_value forkTag)" >> "$GITHUB_OUTPUT"
          echo "fork_commit=$(manifest_value forkCommit)" >> "$GITHUB_OUTPUT"

      - name: Resolve image version
        id: release
        run: |
          MANIFEST_VERSION="${{ steps.vendor.outputs.release_version }}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            case "$TAG" in
              t3code-web-*) VERSION="${TAG#t3code-web-}" ;;
              *) echo "Unexpected tag: $TAG" >&2; exit 1 ;;
            esac
          elif [[ -n "${{ github.event.inputs.releaseVersion }}" ]]; then
            VERSION="${{ github.event.inputs.releaseVersion }}"
          else
            VERSION="$MANIFEST_VERSION"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid web image version: $VERSION" >&2
            exit 1
          fi

          if [[ "$VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "Web image version $VERSION does not match vendor/t3code.yml releaseVersion $MANIFEST_VERSION." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/boblangley/t3code-relay-web
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=t3code-web-${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.vendor.outputs.fork_commit }}
            org.opencontainers.image.ref.name=${{ steps.vendor.outputs.fork_tag }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          # Context is repo root so the Dockerfile can reference vendor-t3code/
          # submodule contents. If web/Dockerfile is self-contained and only
          # needs files inside web/, change context to ./web.
          context: .
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
